<div class="mb-10">
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-2">Deine Wecker</h1>
<p class="text-on-surface-variant text-lg leading-relaxed">Guten Morgen. Bereit für einen sanften Start in den Tag?</p>
</div>
<!-- Alarm List (Bento-style spacing) -->
<div class="space-y-4">
<!-- Alarm Item 1 (Active) -->
<div class="bg-surface-container-lowest p-6 rounded-xl flex items-center justify-between group hover:shadow-[0_12px_32px_rgba(63,81,181,0.06)] transition-all duration-300 cursor-pointer">
<div class="flex flex-col">
<span class="text-5xl font-extrabold tracking-tighter text-primary">07:30</span>
<div class="flex items-center gap-2 mt-2">
<span class="text-sm font-medium text-on-surface-variant">Täglich</span>
<div class="w-1 h-1 rounded-full bg-outline-variant/30"></div>
<span class="text-xs text-primary font-bold">In 7 Std. 12 Min.</span>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>

<div class="flex flex-col">
<span class="text-5xl font-extrabold tracking-tighter text-on-surface">06:00</span>
<div class="flex items-center gap-2 mt-2">
<span class="text-sm font-medium text-on-surface-variant">Wochentage</span>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-1 after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>
</div>
</div>

<div class="flex flex-col">
<span class="text-5xl font-extrabold tracking-tighter text-on-surface">10:00</span>
<div class="flex items-center gap-2 mt-2">
<span class="text-sm font-medium text-on-surface-variant">Wochenende</span>

</div>
<div class="relative inline-flex items-center cursor-pointer">

</div>
</div>

<div class="relative z-10">
<h3 class="text-xl font-bold mb-1">Ruhemodus</h3>
<p class="text-sm opacity-90 max-w-[200px]">Alle Benachrichtigungen sind bis zum ersten Wecker stummgeschaltet.</p>
</div>
<span class="material-symbols-outlined absolute -bottom-6 -right-6 text-9xl opacity-10 rotate-12" data-icon="bedtime">bedtime</span>
</div>
</div>
